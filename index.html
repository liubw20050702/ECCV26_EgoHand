<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello ECCV 2026</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 60px 80px;

    h1 {
      color: #333;
      font-size: 2.5em;
      margin: 0 0 10px;

    p {
      color: #666;
      font-size: 1.2em;
      margin: 0;
    }

<body>
  <div class="card">
    <h1>👋 Hello, ECCV 2026!</h1>
    <p>这是一个最简单的 GitHub Pages Demo</p>

</html>
